spring.application.name=insurance-policy-management-system

# Active profile: h2 or mysql
spring.profiles.active=h2

# Shared JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Keep this file profile-agnostic. See application-h2.properties and application-mysql.properties.
